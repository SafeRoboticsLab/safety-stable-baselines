SafetyPendulum-v1:
  normalize: "{'norm_obs': True, 'norm_reward': True}"   # PPO: normalize rewards
  n_envs: 8
  n_timesteps: 2_500_000

  policy: "MlpPolicy"
  learning_rate: !!float 2e-4          # constant LR; you can try a linear schedule later
  n_steps: 2048                        # per-env steps → rollout size = 2048 * 8 = 16384
  batch_size: 2048                     # divisor of rollout size
  n_epochs: 10                         # 10 passes over rollout

  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.02
  use_sde: True
  sde_sample_freq: 8

  policy_kwargs: "dict(net_arch=dict(pi=[128,128], vf=[128,128]), activation_fn=nn.Tanh, ortho_init=True, log_std_init=-0.2)"
