# To be tuned
SafetyPendulum-v1:
  normalize: "{'norm_obs': True, 'norm_reward': False}"
  n_envs: 8
  n_timesteps: 500_000
  policy: 'MlpPolicy'
  learning_rate: !!float 3e-4
  buffer_size: 1_000_000
  learning_starts: 10_000   # Give replay buffer time to warm up
  batch_size: 512
  tau: 0.02
  gamma: 0.99              # Slightly reduce discount for stability
  train_freq: 1
  gradient_steps: 4        # More Q-updates per sample → faster critic convergence
  ent_coef: 'auto'
  target_update_interval: 1
  policy_kwargs: "dict(net_arch=dict(pi=[128,128], qf=[128,128]), activation_fn=nn.Tanh)"
